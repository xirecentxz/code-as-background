<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed & Crowded Cyber City</title>
    <style>
        :root {
            --sky: #020617;
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --b-dark: #0f172a;
            --b-v-dark: #050a14;
            --unit: 1vmin;
        }

        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .container {
            position: relative;
            width: calc(100 * var(--unit) * 1.6); 
            height: calc(100 * var(--unit));
            background: linear-gradient(to bottom, var(--sky), #111 60%, #1e1b4b);
            overflow: hidden;
        }

        /* --- ATMOSPHERE --- */
        .sun {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 45vmin; height: 45vmin;
            background: linear-gradient(to bottom, var(--neon-pink), transparent 85%);
            border-radius: 50%; filter: blur(3px); opacity: 0.6;
        }

        /* --- LAYER 1: Distant Silhouette (Paling Belakang) --- */
        .city-far {
            position: absolute; bottom: 20%; width: 100%; height: 50%;
            background: #010409; opacity: 0.3; filter: blur(1px);
            clip-path: polygon(0 100%, 2% 20%, 5% 50%, 8% 10%, 12% 40%, 18% 5%, 25% 30%, 30% 10%, 38% 55%, 45% 15%, 52% 40%, 60% 5%, 68% 30%, 75% 10%, 82% 50%, 90% 15%, 95% 40%, 100% 10%, 100% 100%);
        }

        /* --- LAYER 2: Middle-Back (Gedung Redup) --- */
        .b-mid-back {
            position: absolute; bottom: 18%; background: var(--b-v-dark);
            z-index: 1; filter: brightness(0.5);
        }
        .mb-1 { left: 8%; width: 10%; height: 55%; }
        .mb-2 { left: 25%; width: 15%; height: 60%; }
        .mb-3 { left: 45%; width: 8%; height: 40%; }
        .mb-4 { left: 65%; width: 12%; height: 65%; }
        .mb-5 { right: 5%; width: 10%; height: 50%; }

        /* --- LAYER 3: Middle-Front (Gedung Utama Bertumpuk) --- */
        .b-mid-front {
            position: absolute; bottom: 15%; background: var(--b-dark);
            z-index: 5;
            border-top: 1px solid rgba(0, 242, 255, 0.4);
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.6);
        }
        
        /* Variasi Bertumpuk manual */
        .mf-1 { left: 5%; width: 12%; height: 45%; border-top-color: var(--neon-pink); }
        .mf-2 { left: 15%; width: 18%; height: 55%; z-index: 4; filter: brightness(0.8); } /* Di belakang mf-3 */
        .mf-3 { left: 25%; width: 14%; height: 60%; border-top-color: var(--neon-pink); }
        .mf-4 { left: 40%; width: 12%; height: 70%; }
        .mf-5 { left: 50%; width: 20%; height: 45%; z-index: 4; filter: brightness(0.7); } /* Di belakang mf-4 */
        .mf-6 { left: 65%; width: 10%; height: 35%; border-top-color: var(--neon-pink); }
        .mf-7 { right: 10%; width: 15%; height: 50%; }

        /* --- LAYER 4: Foreground (Gedung Paling Depan & Terang) --- */
        .b-front {
            position: absolute; bottom: 10%; background: #010409;
            z-index: 10;
            border-top: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .f-1 { left: 20%; width: 12%; height: 30%; border-color: var(--neon-pink); }
        .f-2 { right: 25%; width: 15%; height: 25%; }

        /* Window Pattern */
        .windows {
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0, 242, 255, 0.25) 1px, transparent 1px);
            background-size: 15% 5%;
        }

        /* --- GROUND --- */
        .ground {
            position: absolute; bottom: 0; width: 100%; height: 20%;
            background: #000; perspective: 180px; z-index: 15;
        }
        .grid {
            width: 200%; height: 200%; margin-left: -50%;
            background-image: linear-gradient(var(--neon-blue) 1px, transparent 1px), linear-gradient(90deg, var(--neon-blue) 1px, transparent 1px);
            background-size: 4vmin 4vmin; transform: rotateX(60deg);
            opacity: 0.1; animation: drive 2s infinite linear;
        }

        @keyframes drive {
            from { transform: rotateX(60deg) translateY(0); }
            to { transform: rotateX(60deg) translateY(4vmin); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sun"></div>
    <div class="city-far"></div>

    <div class="b-mid-back mb-1"></div>
    <div class="b-mid-back mb-2"></div>
    <div class="b-mid-back mb-3"></div>
    <div class="b-mid-back mb-4"></div>
    <div class="b-mid-back mb-5"></div>

    <div class="b-mid-front mf-2"><div class="windows"></div></div>
    <div class="b-mid-front mf-1"><div class="windows"></div></div>
    <div class="b-mid-front mf-3"><div class="windows"></div></div>
    <div class="b-mid-front mf-5"><div class="windows"></div></div>
    <div class="b-mid-front mf-4"><div class="windows"></div></div>
    <div class="b-mid-front mf-6"><div class="windows"></div></div>
    <div class="b-mid-front mf-7"><div class="windows"></div></div>

    <div class="b-front f-1"><div class="windows"></div></div>
    <div class="b-front f-2"><div class="windows"></div></div>

    <div class="ground"><div class="grid"></div></div>
</div>

</body>
</html>
