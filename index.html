<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Cityscape</title>
    <style>
        :root {
            --sky-dark: #020617;
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --building-black: #0f172a;
            --unit: 1vmin;
        }

        body { 
            margin: 0; background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .container {
            position: relative;
            width: calc(100 * var(--unit) * 1.6); 
            height: calc(100 * var(--unit));
            background: linear-gradient(to bottom, var(--sky-dark), #1e1b4b);
            overflow: hidden;
        }

        /* --- BACKGROUND BUILDINGS (Silhouette) --- */
        .city-far {
            position: absolute; bottom: 20%; width: 100%; height: 40%;
            background: #020617;
            clip-path: polygon(0% 100%, 0% 40%, 10% 20%, 20% 45%, 30% 10%, 45% 50%, 60% 5%, 75% 40%, 90% 15%, 100% 40%, 100% 100%);
            opacity: 0.5;
        }

        /* --- NEON BUILDINGS --- */
        .building {
            position: absolute; bottom: 15%; background: var(--building-black);
            border-top: 2px solid var(--neon-blue);
            box-shadow: 0 0 calc(2 * var(--unit)) var(--neon-blue);
        }

        .b1 { left: 10%; width: calc(15 * var(--unit)); height: calc(40 * var(--unit)); border-color: var(--neon-pink); box-shadow: 0 0 calc(2 * var(--unit)) var(--neon-pink); }
        .b2 { left: 30%; width: calc(20 * var(--unit)); height: calc(55 * var(--unit)); }
        .b3 { left: 60%; width: calc(12 * var(--unit)); height: calc(45 * var(--unit)); border-color: var(--neon-pink); box-shadow: 0 0 calc(2 * var(--unit)) var(--neon-pink); }
        .b4 { right: 5%; width: calc(18 * var(--unit)); height: calc(35 * var(--unit)); }

        /* --- WINDOWS (Random Glow) --- */
        .windows {
            width: 100%; height: 100%;
            background-image: radial-gradient(var(--neon-blue) 1px, transparent 1px);
            background-size: calc(3 * var(--unit)) calc(5 * var(--unit));
            opacity: 0.3;
        }

        /* --- CYBER ROAD / GRID --- */
        .road-perspective {
            position: absolute; bottom: 0; width: 100%; height: 25%;
            background: #000;
            perspective: 100px;
        }

        .grid {
            width: 200%; height: 200%;
            margin-left: -50%;
            background-image: 
                linear-gradient(to right, var(--neon-blue) 1px, transparent 1px),
                linear-gradient(to bottom, var(--neon-blue) 1px, transparent 1px);
            background-size: calc(10 * var(--unit)) calc(10 * var(--unit));
            transform: rotateX(60deg);
            opacity: 0.2;
            animation: moveGrid 2s infinite linear;
        }

        @keyframes moveGrid {
            0% { transform: rotateX(60deg) translateY(0); }
            100% { transform: rotateX(60deg) translateY(calc(10 * var(--unit))); }
        }

        /* --- ATMOSPHERIC ELEMENTS --- */
        .sun-retro {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            width: calc(40 * var(--unit)); height: calc(40 * var(--unit));
            background: linear-gradient(to bottom, var(--neon-pink), transparent);
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(5px);
        }

        .scanline {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="scanline"></div>
    <div class="sun-retro"></div>
    <div class="city-far"></div>

    <div class="building b1"><div class="windows"></div></div>
    <div class="building b2"><div class="windows"></div></div>
    <div class="building b3"><div class="windows"></div></div>
    <div class="building b4"><div class="windows"></div></div>

    <div class="road-perspective">
        <div class="grid"></div>
        <div style="position:absolute; top:0; width:100%; height:100%; background: linear-gradient(to bottom, var(--neon-blue), transparent); opacity: 0.1;"></div>
    </div>
</div>

</body>
</html>
