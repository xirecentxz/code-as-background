<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layered Cyber City</title>
    <style>
        :root {
            --sky: #020617;
            --neon-pink: #ff00ff;
            --neon-blue: #00f2ff;
            --unit: 1vmin;
        }

        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        .container {
            position: relative;
            width: calc(100 * var(--unit) * 1.6); 
            height: calc(100 * var(--unit));
            background: linear-gradient(to bottom, var(--sky), #1e1b4b);
            overflow: hidden;
        }

        /* --- BACKGROUND LAYER (Distant Silhouette) --- */
        .layer-back {
            position: absolute; bottom: 20%; width: 100%; height: 50%;
            background: #020617;
            clip-path: polygon(0 100%, 5% 40%, 10% 20%, 15% 45%, 25% 10%, 35% 50%, 50% 15%, 65% 45%, 80% 5%, 90% 30%, 100% 50%, 100% 100%);
            opacity: 0.4;
        }

        /* --- MIDDLE LAYER (Massive Buildings) --- */
        .building {
            position: absolute; bottom: 15%;
            background: #0f172a;
            border-left: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.5);
        }

        /* Variasi Gedung agar Bertumpuk */
        .mid-1 { left: 5%; width: 12%; height: 45%; z-index: 2; border-top: 2px solid var(--neon-pink); }
        .mid-2 { left: 15%; width: 18%; height: 55%; z-index: 1; filter: brightness(0.7); } /* Bertumpuk di belakang mid-1 */
        .mid-3 { left: 40%; width: 15%; height: 65%; z-index: 2; border-top: 2px solid var(--neon-blue); }
        .mid-4 { left: 50%; width: 20%; height: 40%; z-index: 1; filter: brightness(0.6); }

        /* --- FRONT LAYER (Detailed Buildings) --- */
        .front-b {
            position: absolute; bottom: 10%;
            background: #050a14;
            border-top: 3px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            z-index: 5;
        }
        .f-1 { right: 10%; width: 15%; height: 35%; border-color: var(--neon-pink); }
        .f-2 { left: 25%; width: 12%; height: 30%; }

        /* Window Pattern */
        .windows {
            width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0, 242, 255, 0.3) 1px, transparent 1px);
            background-size: 15% 5%;
        }

        /* --- ATMOSPHERE --- */
        .sun {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            width: 40vmin; height: 40vmin;
            background: linear-gradient(to bottom, #f0f, transparent 80%);
            border-radius: 50%;
            filter: blur(2px);
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
        }

        /* Grid Floor */
        .ground {
            position: absolute; bottom: 0; width: 100%; height: 20%;
            background: #000; perspective: 150px; z-index: 10;
        }
        .grid {
            width: 200%; height: 200%; margin-left: -50%;
            background-image: linear-gradient(var(--neon-blue) 1px, transparent 1px), linear-gradient(90deg, var(--neon-blue) 1px, transparent 1px);
            background-size: 40px 40px; transform: rotateX(60deg);
            opacity: 0.15; animation: drive 2s infinite linear;
        }

        @keyframes drive {
            from { transform: rotateX(60deg) translateY(0); }
            to { transform: rotateX(60deg) translateY(40px); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sun"></div>
    <div class="layer-back"></div>

    <div class="building mid-2"><div class="windows"></div></div>
    <div class="building mid-1"><div class="windows"></div></div>
    <div class="building mid-4"><div class="windows"></div></div>
    <div class="building mid-3"><div class="windows"></div></div>

    <div class="front-b f-1"><div class="windows"></div></div>
    <div class="front-b f-2"><div class="windows"></div></div>

    <div class="ground"><div class="grid"></div></div>
</div>

</body>
</html>
